<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        *{padding:0px; margin:0px;}
        body{
            display:flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
        user-select: none;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        -khtml-user-select:none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        outline: none;
        -webkit-tap-highlight-color: rgba(255,255,0,0);}

        canvas
        {border:none;
        display:block;}

        #startScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: absolute; 
            width:100%;
            height:100%;
            background-size: 100% 100%;
            
            z-index: 10; 
            background-color: #E7A1B0; 
            background-repeat: no-repeat;
            
            font-family: 'Press Start 2P', cursive;
            color: white;
            text-align: center;
            

        }

        
        #startButton {
            padding: 10px 15px;
            margin-top: 0px;
            font-family: 'Press Start 2P', cursive;
            font-size: 100%;
            color: #E7A1B0;
            background-color: white;
            border: 4px solid #D47B90;
            cursor: pointer;
            transition: transform 0.1s;
        }

        #startButton:hover {
            transform: scale(1.05);
        }

    </style>  
    <script src="index.js" defer type="module"></script>
</head>
<body style="background-color:#E7A1B0;">
    <h1 style= "font-family:'Press Start 2P', cursive;
                font-size: 225%;
                text-align: center;
                margin-top: 10px;
                margin-bottom: 0px;
                color: white" >KÜRA RUN</h1>
     
    <div id="startScreen">
        <h1 style="font-size: 350%; margin-bottom: 0px; margin-top: 0px;">KüRA RUN</h1>
        <img src="images/runningkura.gif" style="width:30%; margin-top:0 px 0">
        <button id="startButton" style="font-size: 180%;">START</button>
    </div>

    <canvas id="game"></canvas>
</body>
</html>
